    <h2 class="title">柳州的春天，是香辣的</h2>
    <div class="content">
        <div class="text">
            <p>来到柳州，一定要吃一碗地道螺蛳粉！酸、辣、鲜、香、烫，一口入魂，回味无穷。</p >
            <br>
            <p>劲道米粉、酥脆腐竹、爽口酸笋、浓香螺蛳汤，每一口都是柳州的灵魂味道。</p >
            <br>
            <p>春天赏花，夏天玩水，秋天观景，冬天嗦粉。在柳州的春天，一边看花海，一边吃螺蛳粉，才是最地道的打开方式。</p >
