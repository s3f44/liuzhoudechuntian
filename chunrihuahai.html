<div class="container">
    <h2 class="title">柳州的春天，是粉色的</h2>
    <div class="content">
        <div class="text">
            <p>每到三四月，柳州便化身“紫荆花城”。大街小巷、江边路旁，洋紫荆竞相开放，粉白相间，如云似霞。</p >
            <br>
            <p>洋紫荆是柳州的市花，春天一到，整座城市被温柔的粉色包裹，行走其间，如同走进童话世界。</p >
            <br>
            <p>江滨公园、龙潭公园、柳侯公园都是赏花绝佳地点，春风一吹，花瓣飘落，浪漫至极。</p >
