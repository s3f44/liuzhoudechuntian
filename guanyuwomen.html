    <div class="text">
        <p>我们致力于宣传柳州的春天美景与文化，让更多人了解柳州、爱上柳州。</p >
        <br>
        <p>这里有最美的春日花海、最绿的江岸风光、最地道的螺蛳粉美食。</p >
        <br>
        <p>欢迎每一位朋友来到柳州，在春风里、花香里、螺香里，感受这座城市独有的温柔与热情。</p >
